<!doctype html>
<html lang="pt-br">
<head>

<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<title>SchoolManager - Aluno</title>

<link rel="stylesheet" href="styles.css?v=18"/>

</head>

<body>

<div id="hdr"></div>

<div class="container">

<div style="display:flex;gap:8px;margin-bottom:12px">
<button id="btnNotas" class="btn">Notas</button>
<button id="btnAulas" class="btn ghost">Aulas</button>
</div>

<!-- ================= NOTAS ================= -->
<div id="notasPanel">

<div class="card">
<div style="display:flex;justify-content:space-between;align-items:center">
<h3>Resumo Final - Notas</h3>
<button class="btn" id="btnBoletim">Boletim (PDF)</button>
</div>

<div id="resumoNotas" class="grid cols-3"></div>
</div>

<div class="card" style="margin-top:16px">
<h3>Resumo Final - Frequência</h3>
<div id="resumoFreq" class="grid cols-3"></div>
</div>

</div>

<!-- ================= AULAS ================= -->
<div id="aulasPanel" style="display:none">

<div class="card">
<h3>Horário das Aulas</h3>
<div id="horarioContent"></div>
</div>

<div class="card" style="margin-top:16px">
<h3>Calendário do Ano Letivo 2026</h3>
<div id="calendarioContent"></div>
</div>

</div>
</div>

<script src="app.js?v=18"></script>

<script>

App.guard(['aluno']);
App.mountHeader();

const user = App.currentUser();
const discList = App.disciplinas.list();
const discMap = Object.fromEntries(discList.map(d=>[d.id,d.nome]));

// ================= FORMATADOR =================
function formatarDataBR(dataISO){
const [ano,mes,dia]=dataISO.split("-");
return `${dia}/${mes}/${ano}`;
}

// ================= RESUMOS =================
function cardNota(did){
const media=App.calcMediaAlunoDisciplina(user.id,did);
return `<div class="card">${discMap[did]}<div class="small">Média: ${media??'-'}</div></div>`;
}

function cardFreq(did){
const freq=App.calcFreqAlunoDisciplina(user.id,did);
return `<div class="card">${discMap[did]}<div class="small">Frequência: ${freq}%</div></div>`;
}

document.getElementById("resumoNotas").innerHTML=
discList.map(d=>cardNota(d.id)).join("");

document.getElementById("resumoFreq").innerHTML=
discList.map(d=>cardFreq(d.id)).join("");


// ================= HORÁRIO =================
function renderHorario(){

const turmaId=App.getTurmaOfAluno(user.id);
const horario=App.getHorarioByTurma(turmaId);

const dias={
1:"Segunda-feira",
2:"Terça-feira",
3:"Quarta-feira",
4:"Quinta-feira",
5:"Sexta-feira"
};

if(!horario || !horario.length){
horarioContent.innerHTML="<div class='small'>Horário não disponível.</div>";
return;
}

const byDay={};

horario.forEach(h=>{
(byDay[h.dia]=byDay[h.dia]||[]).push(h);
});

horarioContent.innerHTML=`
<table class="table">
<thead>
<tr>
<th>Dia</th>
<th>Início</th>
<th>Término</th>
<th>Disciplina</th>
</tr>
</thead>

<tbody>
${Object.keys(dias).map(k=>{

const aulas=(byDay[k]||[])
.sort((a,b)=>a.inicio.localeCompare(b.inicio));

if(!aulas.length){
return `<tr>
<td>${dias[k]}</td>
<td colspan="3">Sem aulas</td>
</tr>`;
}

return aulas.map(a=>`
<tr>
<td>${dias[k]}</td>
<td>${a.inicio}</td>
<td>${a.fim}</td>
<td>${discMap[a.disciplinaId]||"-"}</td>
</tr>`).join("");

}).join("")}
</tbody>
</table>`;
}


// ================= CALENDÁRIO =================
function renderCalendario(){

const inicio="2026-02-05";
const fim="2026-12-20";

const feriados=[
["2026-01-01","Confraternização Universal"],
["2026-02-16","Carnaval"],
["2026-02-17","Carnaval"],
["2026-04-03","Sexta-feira Santa"],
["2026-04-21","Tiradentes"],
["2026-05-01","Dia do Trabalhador"],
["2026-06-04","Corpus Christi"],
["2026-09-07","Independência do Brasil"],
["2026-10-12","Nossa Senhora Aparecida"],
["2026-11-02","Finados"],
["2026-11-15","Proclamação da República"],
["2026-12-25","Natal"]
];

const recessos=[
["Recesso Escolar de Janeiro","2026-01-02","2026-02-04"],
["Recesso Escolar de Julho","2026-07-10","2026-07-24"],
["Recesso Escolar de Dezembro","2026-12-21","2026-12-31"]
];

calendarioContent.innerHTML=`

<div>
<strong>Início:</strong> ${formatarDataBR(inicio)}
•
<strong>Fim:</strong> ${formatarDataBR(fim)}
</div>

<div style="margin-top:12px">
<strong>📅 Feriados Nacionais:</strong>
<ul>
${feriados.map(f=>
`<li>${formatarDataBR(f[0])} — ${f[1]}</li>`
).join("")}
</ul>
</div>

<div style="margin-top:12px">
<strong>🏖️ Períodos de Recesso Escolar:</strong>
<ul>
${recessos.map(r=>
`<li>${r[0]}: ${formatarDataBR(r[1])} a ${formatarDataBR(r[2])}</li>`
).join("")}
</ul>
</div>

<div style="margin-top:12px">
<button class="btn" id="btnCalendarioPDF">
📅 Abrir Calendário Letivo 2026
</button>
</div>
`;
}


// ================= ABRIR PDF =================
document.addEventListener("click",e=>{
if(e.target.id==="btnCalendarioPDF"){

window.open("./CalendarioLetivo2026.pdf","_blank");

}
});


// ================= TROCA DE PAINEL =================
function showNotas(){
notasPanel.style.display="block";
aulasPanel.style.display="none";
}

function showAulas(){
renderHorario();
renderCalendario();
notasPanel.style.display="none";
aulasPanel.style.display="block";
}

btnNotas.onclick=showNotas;
btnAulas.onclick=showAulas;

showNotas();

btnBoletim.onclick=()=>App.openBoletimAlunoPrint(user.id);

</script>

</body>
</html>
