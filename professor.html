<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel do Professor - SchoolManager</title>

<style>

body{
  font-family:Arial;
  padding:20px;
  background:#f4f6f9;
}

h2{
  margin-bottom:15px;
}

select,input,button{
  padding:8px;
  margin:5px;
}

table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
  margin-top:20px;
}

th,td{
  border:1px solid #ccc;
  padding:8px;
  text-align:center;
}

button{
  cursor:pointer;
}

.presente{
  background:#c8f7c5;
}

.falta{
  background:#f7c5c5;
}

</style>

</head>

<body>

<h2>Lançamento de Presença</h2>

<select id="turmaSelect"></select>
<input type="date" id="dataAula">

<button onclick="carregarAlunos()">Carregar Alunos</button>

<table>

<thead>
<tr>
<th>Aluno</th>
<th>Presente</th>
<th>Falta</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="listaAlunos"></tbody>

</table>

<script src="app.js"></script>

<script>

/* ===========================
   CARREGAR TURMAS
=========================== */

function carregarTurmas(){

  const turmas = App.getTurmas();
  const select = document.getElementById("turmaSelect");

  select.innerHTML="";

  turmas.forEach(t=>{
    const op=document.createElement("option");
    op.value=t.id;
    op.textContent=t.nome;
    select.appendChild(op);
  });
}

carregarTurmas();


/* ===========================
   CARREGAR ALUNOS
=========================== */

function carregarAlunos(){

  const turmaId = turmaSelect.value;
  const alunos = App.alunosByTurma(turmaId);

  const tbody = document.getElementById("listaAlunos");
  tbody.innerHTML="";

  alunos.forEach(aluno=>{

    const tr=document.createElement("tr");

    tr.innerHTML=`
      <td>${aluno.name}</td>

      <td>
        <button onclick="marcar('${aluno.id}','P')">✔</button>
      </td>

      <td>
        <button onclick="marcar('${aluno.id}','F')">✖</button>
      </td>

      <td id="acao-${aluno.id}">
        -
      </td>
    `;

    tbody.appendChild(tr);

  });

}


/* ===========================
   MARCAR PRESENÇA
=========================== */

function marcar(alunoId,status){

  const data = dataAula.value;

  if(!data){
    alert("Escolha a data");
    return;
  }

  App.salvarPresenca({
    alunoId,
    data,
    status
  });

  atualizarLinha(alunoId);
}


/* ===========================
   ATUALIZAR LINHA
=========================== */

function atualizarLinha(alunoId){

  const data = dataAula.value;

  const registro = App.getPresenca(alunoId,data);

  const td = document.getElementById(`acao-${alunoId}`);

  if(!registro){
    td.innerHTML="-";
    return;
  }

  td.innerHTML=`
    <button onclick="editar('${alunoId}')">Editar</button>
    <button onclick="excluir('${alunoId}')">Excluir</button>
  `;
}


/* ===========================
   EDITAR
=========================== */

function editar(alunoId){

  const nova = prompt("Digite P (presente) ou F (falta)");

  if(!nova) return;

  App.salvarPresenca({
    alunoId,
    data:dataAula.value,
    status:nova.toUpperCase()
  });

  atualizarLinha(alunoId);
}


/* ===========================
   EXCLUIR
=========================== */

function excluir(alunoId){

  if(!confirm("Excluir registro?")) return;

  App.excluirPresenca(alunoId,dataAula.value);

  atualizarLinha(alunoId);
}

</script>

</body>
</html>
