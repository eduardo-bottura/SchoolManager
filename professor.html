<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<title>Professor - Diário de Classe</title>

<style>
body{
  font-family:Arial;
  background:#f4f6f9;
  padding:20px;
}

.card{
  background:#fff;
  padding:15px;
  border-radius:8px;
  margin-bottom:20px;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  border:1px solid #ccc;
  padding:8px;
}

button{
  padding:6px 10px;
  cursor:pointer;
}
</style>

</head>

<body>

<h1>Diário do Professor</h1>

<!-- ================= LANÇAR PRESENÇA ================= -->

<div class="card">

<h3>Lançar Presença</h3>

<input type="date" id="dataAula">

<table>
<thead>
<tr>
<th>Aluno</th>
<th>Status</th>
</tr>
</thead>

<tbody id="listaAlunos"></tbody>

</table>

<br>
<button id="salvarPresencas">Salvar Presenças</button>

</div>


<!-- ================= PRESENÇAS SALVAS ================= -->

<div class="card">

<h3>Presenças já lançadas</h3>

<table>
<thead>
<tr>
<th>Aluno</th>
<th>Data</th>
<th>Status</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="listaPresencas"></tbody>

</table>

</div>


<script src="app.js"></script>

<script>

/* ==============================
   CARREGAR ALUNOS
==============================*/

const listaAlunos =
document.getElementById("listaAlunos");

function drawAlunos(){

  const alunos = App.getAlunos();

  listaAlunos.innerHTML="";

  alunos.forEach(a=>{

    const tr=document.createElement("tr");

    tr.innerHTML=`
      <td>${a.nome}</td>

      <td>
        <select data-aluno="${a.id}">
          <option value="P">Presente</option>
          <option value="F">Falta</option>
        </select>
      </td>
    `;

    listaAlunos.appendChild(tr);

  });

}


/* ==============================
   SALVAR PRESENÇAS
==============================*/

document.getElementById("salvarPresencas")
.onclick=function(){

  const data =
    document.getElementById("dataAula").value;

  if(!data){
    alert("Escolha a data");
    return;
  }

  const selects =
    document.querySelectorAll("select[data-aluno]");

  selects.forEach(sel=>{

    App.addPresenca({
      alunoId: sel.dataset.aluno,
      data: data,
      status: sel.value
    });

  });

};


/* ==============================
   LISTA PRESENÇAS SALVAS
==============================*/

const tabelaPresencas =
document.getElementById("listaPresencas");

function drawPresencas(){

  const presencas = App.getPresencas();
  const alunos = App.getAlunos();

  tabelaPresencas.innerHTML="";

  presencas.forEach(p=>{

    const aluno =
      alunos.find(a=>a.id===p.alunoId);

    const tr=document.createElement("tr");

    tr.innerHTML=`
      <td>${aluno?.nome || "-"}</td>
      <td>${p.data}</td>
      <td>${p.status}</td>

      <td>
        <button onclick="editarPresenca('${p.id}')">
          Editar
        </button>

        <button onclick="excluirPresenca('${p.id}')">
          Excluir
        </button>
      </td>
    `;

    tabelaPresencas.appendChild(tr);

  });

}


/* ==============================
   EDITAR
==============================*/

window.editarPresenca=function(id){

  const presenca =
    App.getPresencas().find(p=>p.id===id);

  const novo =
    prompt("Digite P ou F",presenca.status);

  if(!novo) return;

  App.updatePresenca(id,{
    status:novo.toUpperCase()
  });

};


/* ==============================
   EXCLUIR
==============================*/

window.excluirPresenca=function(id){

  if(confirm("Excluir registro?")){
    App.deletePresenca(id);
  }

};


/* ==============================
   AUTO UPDATE
==============================*/

window.addEventListener(
  "app-updated",
  drawPresencas
);


/* ==============================
   START
==============================*/

drawAlunos();
drawPresencas();

</script>

</body>
</html>
